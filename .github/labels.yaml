# Labels for issue and PR management
# Sync with: gh label import -R hassos-apps/app-__APP_SLUG__ .github/labels.yaml

- name: bug
  color: "d73a4a"
  description: Something isn't working

- name: enhancement
  color: "a2eeef"
  description: New feature or request

- name: feature
  color: "0075ca"
  description: New functionality

- name: breaking-change
  color: "e11d48"
  description: Introduces a breaking change

- name: documentation
  color: "0075ca"
  description: Improvements or additions to documentation

- name: maintenance
  color: "fef2c0"
  description: Maintenance and chores

- name: dependencies
  color: "0366d6"
  description: Dependency updates

- name: chore
  color: "fef2c0"
  description: Routine tasks

- name: help-wanted
  color: "008672"
  description: Extra attention is needed

- name: wontfix
  color: "ffffff"
  description: This will not be worked on
