name: Stale

on:
  schedule:
    - cron: "0 6 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been automatically marked as stale because it has
            not had recent activity. It will be closed if no further activity
            occurs within 7 days.
          stale-pr-message: >
            This pull request has been automatically marked as stale because
            it has not had recent activity. It will be closed if no further
            activity occurs within 7 days.
